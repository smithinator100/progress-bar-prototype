<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>*{margin:0;padding:0;overflow:hidden}iframe{width:100%;height:100%;border:none}</style>
</head>
<body>
<iframe id="target" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
<script>
  const params = new URLSearchParams(window.location.search);
  const url = params.get('url');
  const throttle = params.get('throttle') || 'none';
  const iframe = document.getElementById('target');

  window.addEventListener('message', (e) => {
    if (
      e.data &&
      e.data.source === 'progress-bar-observer' &&
      typeof window.__captureEvent === 'function'
    ) {
      window.__captureEvent(e.data.event);
    }
  });

  if (url) {
    iframe.src = '/proxy?url=' + encodeURIComponent(url) + '&throttle=' + encodeURIComponent(throttle);
  }
</script>
</body>
</html>
