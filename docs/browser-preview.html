<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bar Component</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Roboto+Condensed:wght@600&display=swap" rel="stylesheet">
  <style>
    /* Browser preview page: split layout with parameters sidebar */
    .browser-preview-page .split-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .browser-preview-page .split-main {
      display: grid;
      grid-template-columns: 1fr 6px minmax(280px, min(360px, 35%));
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .browser-preview-page .params-sidebar {
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      overflow: hidden;
      border-left: 1px solid var(--border-color);
    }
    .browser-preview-page .params-sidebar-title {
      flex-shrink: 0;
      padding: 16px 16px 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-color);
    }
    @media (max-width: 900px) {
      .browser-preview-page .split-main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }
      .browser-preview-page .split-handle {
        display: none;
      }
      .browser-preview-page .params-sidebar {
        border-left: none;
        border-top: 1px solid var(--border-color);
        max-height: 280px;
      }
    }
    .browser-preview-page .browser-preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
      background: var(--bg-tertiary) url('img/macos-13-ventura-stock-dark-22-09-2024-1727044720-hd-wallpaper.webp') center / cover no-repeat;
    }
    .browser-preview-page .browser-viewport {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .browser-preview-page .browser-slot {
      border-left: none;
    }
    .browser-preview-page .browser-slot-label {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app browser-preview-page">
    <!-- Control Bar -->
    <header class="control-bar">
      <a href="index.html" class="btn btn-secondary" style="text-decoration: none; margin-right: 8px;">← Compare</a>
      <div class="url-input-group">
        <input
          type="url"
          id="url-input"
          class="url-input"
          placeholder="Enter URL"
          autocomplete="off"
          style="max-width: 400px;"
        >
        <button id="go-btn" class="btn btn-primary">Go</button>
        <button id="demo-btn" class="btn btn-secondary">Demo</button>
      </div>
      <div class="control-group">
        <label for="speed-select">Speed:</label>
        <select id="speed-select" class="speed-select">
          <option value="none">No throttle</option>
          <option value="fast-wifi">Fast WiFi</option>
          <option value="4g">4G</option>
          <option value="slow-4g">Slow 4G</option>
          <option value="3g" selected>3G</option>
          <option value="slow-3g">Slow 3G</option>
        </select>
      </div>
      <button id="clear-btn" class="btn btn-secondary">Clear</button>
    </header>

    <!-- Main Split Panel: browser + parameters sidebar -->
    <main class="split-panel">
      <div class="split-main">
        <!-- Browser Preview Area -->
        <section class="browser-preview-area">
      <div class="browser-viewport" id="browser-viewport">
        <div class="browser-container" id="browser-container">
          <!-- Android Status Bar -->
          <div class="android-status-bar">
            <div class="status-camera">
              <div class="camera-dot"></div>
            </div>
            <span class="status-time">12:30</span>
            <div class="status-icons">
              <svg class="status-icon" width="16" height="12" viewBox="0 0 24 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="WiFi">
                <path d="M1 7.13L3.07 9.2C5.6 6.67 9.11 5.1 13 5.1C16.89 5.1 20.4 6.67 22.93 9.2L25 7.13C21.91 4.05 17.67 2.1 13 2.1C8.33 2.1 4.09 4.05 1 7.13ZM9.07 13.06L13 17L16.93 13.06C15.88 12 14.52 11.36 13 11.36C11.48 11.36 10.12 12 9.07 13.06ZM5.04 9.03L7.11 11.1C8.71 9.49 10.74 8.5 13 8.5C15.26 8.5 17.29 9.49 18.89 11.1L20.96 9.03C18.8 6.85 15.56 5.5 13 5.5C10.44 5.5 7.2 6.85 5.04 9.03Z" fill="rgba(0,0,0,0.84)"/>
              </svg>
              <svg class="status-icon" width="13" height="13" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Cellular signal">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M0 12H12V0L0 12Z" fill="rgba(0,0,0,0.84)"/>
              </svg>
              <span class="status-battery-pct">99%</span>
              <svg class="status-icon" width="9" height="13" viewBox="0 0 8 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Battery">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M5.14286 0.75V0H2.57143V0.75H1.05494C0.472315 0.75 0 1.22232 0 1.80495V10.9451C0 11.5277 0.472315 12 1.05495 12H6.65934C7.24197 12 7.71429 11.5277 7.71429 10.9451V1.80495C7.71429 1.22231 7.24197 0.75 6.65934 0.75H5.14286Z" fill="rgba(0,0,0,0.84)"/>
              </svg>
            </div>
          </div>
          <!-- Android URL Bar -->
          <div class="android-url-bar">
            <div class="url-bar-row">
              <div class="url-bar-input-wrap">
                <div class="url-bar-input">
                  <div class="url-bar-site-status">
                    <img src="img/shield.svg" width="40" height="40" alt="Site is secure">
                  </div>
                  <span class="url-bar-text" id="android-url-text">Search</span>
                  <div class="url-bar-icon-btn" aria-label="AI Chat">
                    <img src="img/ai.svg" width="40" height="40" alt="AI Chat">
                  </div>
                </div>
                <div class="progress-bar-container">
                  <div class="progress-bar" id="progress-bar"></div>
                </div>
              </div>
              <div class="url-bar-toolbar">
                <button class="url-bar-icon-btn" aria-label="Fireproof">
                  <img src="img/fire.svg" width="40" height="40" alt="Fireproof">
                </button>
                <button class="url-bar-icon-btn" aria-label="Tabs">
                  <img src="img/tabs.svg" width="40" height="40" alt="Tabs">
                </button>
                <button class="url-bar-icon-btn" aria-label="More options">
                  <img src="img/more-menu.svg" width="40" height="40" alt="More options">
                </button>
              </div>
            </div>
          </div>
          <iframe
            id="page-iframe"
            class="page-iframe"
            sandbox="allow-scripts allow-same-origin allow-forms"
          ></iframe>
        </div>
      </div>
        </section>

        <!-- Drag Handle -->
        <div class="split-handle" id="split-handle">
          <div class="split-handle-grip"></div>
        </div>

        <!-- Parameters Sidebar (blank) -->
        <aside class="params-sidebar">
        </aside>
      </div>
    </main>
  </div>

  <script src="progress-bar.js"></script>
  <script>
    (function() {
      const urlInput = document.getElementById('url-input');
      const goBtn = document.getElementById('go-btn');
      const demoBtn = document.getElementById('demo-btn');
      const clearBtn = document.getElementById('clear-btn');
      const speedSelect = document.getElementById('speed-select');
      const pageIframe = document.getElementById('page-iframe');
      const progressBarEl = document.getElementById('progress-bar');
      const androidUrlText = document.getElementById('android-url-text');

      const progressBar = new ProgressBar(progressBarEl, {
        getInitialProgress: () => 50,
        onComplete: () => progressBar.showAt(50)
      });

      // Default: show bar at 50%
      progressBar.showAt(50);

      let stallTimer = null;
      const STALL_TIMEOUT = 8000;

      function resetStallTimer() {
        if (stallTimer) clearTimeout(stallTimer);
        stallTimer = setTimeout(() => {
          if (progressBar.isLoading && !progressBar.isComplete) progressBar.complete();
        }, STALL_TIMEOUT);
      }

      function clearStallTimer() {
        if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; }
      }

      function setUrlBarText(text) {
        androidUrlText.textContent = text;
      }

      function loadUrl() {
        let url = urlInput.value.trim();
        if (!url) return;

        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          url = 'https://' + url;
          urlInput.value = url;
        }

        try {
          const parsed = new URL(url);
          setUrlBarText(parsed.hostname + (parsed.pathname !== '/' ? parsed.pathname : ''));
        } catch {
          setUrlBarText(url);
        }

        progressBar.reset();
        progressBar.start();
        resetStallTimer();

        const throttle = speedSelect.value;
        const proxyUrl = `/proxy?url=${encodeURIComponent(url)}&throttle=${throttle}`;
        pageIframe.src = proxyUrl;
      }

      function loadDemo() {
        setUrlBarText('demo');
        progressBar.startFrom(50);
        resetStallTimer();
        pageIframe.src = 'demo.html';
      }

      goBtn.addEventListener('click', loadUrl);
      demoBtn.addEventListener('click', loadDemo);
      urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadUrl(); });

      clearBtn.addEventListener('click', () => {
        clearStallTimer();
        progressBar.showAt(50);
        pageIframe.src = 'about:blank';
        urlInput.value = '';
        setUrlBarText('Search');
      });

      window.addEventListener('message', (e) => {
        if (!e.data || e.data.source !== 'progress-bar-observer') return;
        if (e.source !== pageIframe.contentWindow) return;

        if (e.data.event.type === 'window-load') {
          clearStallTimer();
          progressBar.complete();
        } else if (e.data.event.type === 'navigation-error') {
          clearStallTimer();
          progressBar.error();
        }
      });

      pageIframe.addEventListener('load', () => {
        clearStallTimer();
        if (!progressBar.isComplete) progressBar.complete();
      });

      // Center and scale browser in viewport
      const CONTAINER_W = 412;
      const CONTAINER_H = 280;
      const FULL_PHONE_H = 917;
      const viewport = document.getElementById('browser-viewport');
      const container = document.getElementById('browser-container');

      function scaleContainer() {
        const scale = Math.min(viewport.clientWidth / CONTAINER_W, viewport.clientHeight / FULL_PHONE_H) * 0.9;
        const offsetX = viewport.clientWidth / 2 - CONTAINER_W / 2;
        const offsetY = viewport.clientHeight / 2 - CONTAINER_H / 2 - 80;
        container.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      }

      new ResizeObserver(scaleContainer).observe(viewport);
      scaleContainer();

      // Split panel drag handle
      const splitHandle = document.getElementById('split-handle');
      const splitMain = document.querySelector('.split-main');
      let isDragging = false;

      splitHandle.addEventListener('mousedown', (e) => {
        isDragging = true;
        splitHandle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        pageIframe.style.pointerEvents = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const panelRect = splitMain.getBoundingClientRect();
        const newLeftWidth = e.clientX - panelRect.left;
        const minWidth = 200;
        const maxWidth = panelRect.width - 200 - 6;
        const clamped = Math.max(minWidth, Math.min(maxWidth, newLeftWidth));
        splitMain.style.gridTemplateColumns = clamped + 'px 6px 1fr';
      });

      document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        splitHandle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        pageIframe.style.pointerEvents = '';
      });
    })();
  </script>
  <script>
    (function() {
      const dampenSlider = document.getElementById('param-dampen');
      const dampenVal = document.getElementById('param-dampen-val');
      const stiffnessSlider = document.getElementById('param-stiffness');
      const stiffnessVal = document.getElementById('param-stiffness-val');

      if (dampenSlider) dampenSlider.addEventListener('input', () => {
        dampenVal.textContent = parseFloat(dampenSlider.value).toFixed(2);
      });
      if (stiffnessSlider) stiffnessSlider.addEventListener('input', () => {
        stiffnessVal.textContent = stiffnessSlider.value;
      });
    })();
  </script>
</body>
</html>
